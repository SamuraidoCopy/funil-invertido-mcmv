version: "3.8"

services:
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - evolution-redis
      - evolution-db
    networks:
      - evolution-net

  evolution-db:
    container_name: evolution_db
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution_user
      POSTGRES_PASSWORD: evolution_password
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    networks:
      - evolution-net

  evolution-redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: always
    networks:
      - evolution-net

  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - evolution-net

networks:
  evolution-net:
    driver: bridge

volumes:
  evolution_db_data:
  n8n_data:
